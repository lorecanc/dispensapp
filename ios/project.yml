name: Inventario
options:
  bundleIdPrefix: com.inventario
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

settings:
  base:
    DEVELOPMENT_TEAM: ""
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1

targets:
  Inventario:
    type: application
    platform: iOS
    sources:
      - path: Inventario
    info:
      path: Inventario/Info.plist
      properties:
        NSCameraUsageDescription: Per scansionare i codici a barre dei prodotti.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        UILaunchScreen: {}
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.inventario.app
      INFOPLIST_FILE: Inventario/Info.plist
      SWIFT_VERSION: "5.9"
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
